<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hüttenfuchs - BR Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0a0a0f; --surf:#111118; --acc:#4466ff; --txt:#ffffff; --muted:#808090; }
        body { background: var(--bg); color: var(--txt); font-family: 'Sora', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: var(--surf); padding: 25px; border-radius: 20px; width: 100%; max-width: 500px; border: 1px solid #303048; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--acc); font-size: 1.5rem; margin-bottom: 5px; }
        .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 25px; }
        #q-text { font-size: 1.1rem; font-weight: 600; min-height: 60px; margin-bottom: 20px; line-height: 1.4; }
        .options { display: grid; gap: 12px; }
        button { background: #181824; border: 1px solid #303048; color: white; padding: 15px; border-radius: 12px; cursor: pointer; text-align: left; font-family: inherit; font-size: 1rem; transition: 0.2s; }
        button:hover { border-color: var(--acc); background: #202030; }
        button:disabled { cursor: default; opacity: 0.6; border-color: #303048; }
        #feedback { margin-top: 25px; padding: 15px; border-radius: 10px; text-align: center; font-weight: 600; display: none; }
        .btn-next { background: var(--acc); color: white; border: none; width: 100%; margin-top: 20px; text-align: center; font-weight: bold; padding: 15px; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h1>🎓 BR-Tagesquiz</h1>
    <p class="sub">Hüttenfuchs Edition • 100% Sicher & Zufällig</p>
    <div id="q-text">Lade Fragen...</div>
    <div id="q-options" class="options"></div>
    <div id="feedback"></div>
    <button id="next-btn" class="btn-next" style="display:none;" onclick="handleNext()">Nächste Frage</button>
</div>

<script>
let allQuestions = [];
let currentSessionQuestions = [];
let currentIndex = 0;
let correctCount = 0; 
let trackingAllowed = false;

let totalPlayed = localStorage.getItem('hüttenfuchs_total') || 0;
let totalCorrect = localStorage.getItem('hüttenfuchs_correct') || 0;

// Hilfsfunktion zum Mischen
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

async function loadQuiz() {
    const consent = localStorage.getItem('hüttenfuchs_consent');
    if (consent === null) { showConsent(); return; }
    trackingAllowed = (consent === 'true');
    startLogic();
}

function showConsent() {
    document.getElementById('q-text').innerHTML = `
        <div style="text-align:left; padding:10px; background: rgba(68, 102, 255, 0.1); border-radius: 15px;">
            <h3 style="margin-top:0; color:var(--acc);">📊 Statistik & Fairness</h3>
            <p style="font-size:0.85rem;">Möchtest du deine Ergebnisse lokal speichern? <br><br>
            💡 <b>Neu:</b> Antworten werden ab jetzt bei jeder Frage zufällig gemischt!</p>
        </div>`;
    document.getElementById('q-options').innerHTML = `
        <button onclick="setConsent(true)" style="background:var(--acc); text-align:center;">Ja, los geht's!</button>
        <button onclick="setConsent(false)" style="text-align:center; opacity:0.7;">Nein, nur spielen</button>`;
}

function setConsent(val) {
    localStorage.setItem('hüttenfuchs_consent', val);
    trackingAllowed = val;
    startLogic();
}

async function startLogic() {
    try {
        const res = await fetch('fragen.csv?v=' + new Date().getTime());
        const txt = await res.text();
        allQuestions = txt.split(/\r?\n/).filter(r => r.trim() !== '' && r.includes(';'));
        allQuestions.shift(); 
        prepareDailyQuestions();
        showQuestion();
    } catch (e) {
        document.getElementById('q-text').innerText = "CSV-Datei konnte nicht geladen werden.";
    }
}

function prepareDailyQuestions() {
    const dayId = Math.floor(new Date().getTime() / 86400000); 
    const startIdx = (dayId * 5) % allQuestions.length;
    const dailyNew = [];
    for(let i=0; i<5; i++) { dailyNew.push(allQuestions[(startIdx + i) % allQuestions.length]); }
    const dailyRepeat = [];
    for(let i=0; i<2; i++) { dailyRepeat.push(allQuestions[((dayId - 1) * 5 + i) % allQuestions.length]); }
    currentSessionQuestions = [...dailyRepeat, ...dailyNew];
}

function showQuestion() {
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');
    const opts = document.getElementById('q-options');
    feedback.style.display = 'none';
    nextBtn.style.display = 'none';

    if (currentIndex >= currentSessionQuestions.length) { showFinal(); return; }

    const cols = currentSessionQuestions[currentIndex].split(';');
    
    // Dynamische Erkennung: Wo steht die Lösung? (Letzte Spalte)
    const solutionIdx = cols.length - 1;
    const solutionLetter = cols[solutionIdx].trim().toUpperCase();
    const letterToIdx = { 'A': 2, 'B': 3, 'C': 4, 'D': 5 };
    const correctText = cols[letterToIdx[solutionLetter]].trim();

    // Antworten sammeln (A, B, C und falls vorhanden D)
    let choices = [cols[2], cols[3], cols[4]];
    if (cols[5] && cols[5].trim() !== "" && solutionIdx === 6) {
        choices.push(cols[5]); // Füge D hinzu, wenn die Spalte existiert
    }

    // Antworten mischen
    shuffle(choices);

    document.getElementById('q-text').innerHTML = `
        <small style="color:var(--acc)">FRAGE ${currentIndex + 1} VON 7</small><br>
        ${cols[1]}`;

    opts.innerHTML = '';
    choices.forEach(choiceText => {
        if(!choiceText || choiceText.trim() === "") return;
        const btn = document.createElement('button');
        btn.innerText = choiceText.trim();
        btn.onclick = () => {
            feedback.style.display = 'block';
            const isCorrect = (choiceText.trim() === correctText);
            if (isCorrect) correctCount++; 
            feedback.innerText = isCorrect ? "✅ Richtig!" : "❌ Falsch! Lösung: " + correctText;
            feedback.style.color = isCorrect ? "#44ff88" : "#ff4444";
            feedback.style.background = isCorrect ? "rgba(255,255,255,0.05)" : "rgba(255,0,0,0.05)";
            Array.from(opts.children).forEach(b => b.disabled = true);
            nextBtn.style.display = 'block';
            nextBtn.innerText = (currentIndex + 1 < currentSessionQuestions.length) ? "Weiter" : "Ergebnis";
        };
        opts.appendChild(btn);
    });
}

function handleNext() { currentIndex++; showQuestion(); }

function showFinal() {
    let statsHTML = "";
    if (trackingAllowed) {
        totalPlayed = parseInt(totalPlayed) + currentSessionQuestions.length;
        totalCorrect = parseInt(totalCorrect) + correctCount;
        localStorage.setItem('hüttenfuchs_total', totalPlayed);
        localStorage.setItem('hüttenfuchs_correct', totalCorrect);
        const ewigerSchnitt = Math.round((totalCorrect / totalPlayed) * 100);
        statsHTML = `<hr style="border:0; border-top:1px solid #333; margin:15px 0;">
                     <p style="font-size:0.8rem; color:var(--acc);">📊 Dein Gesamtschnitt: ${ewigerSchnitt}%</p>`;
    }
    document.getElementById('q-text').innerHTML = `
        <div style="text-align:center; padding:10px;">
            <h2 style="color:var(--acc);">Fertig!</h2>
            <p style="font-size:1.5rem; font-weight:bold;">${correctCount} von 7 richtig</p>
            ${statsHTML}
            <p style="font-size:0.7rem; color:var(--muted); margin-top:20px;">Morgen gibt es 5 neue Fragen! ⚒️</p>
        </div>`;
    document.getElementById('q-options').innerHTML = "";
    document.getElementById('next-btn').style.display = 'none';
}
loadQuiz();
</script>
</body>
</html>
