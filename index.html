<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hüttenfuchs - BR Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0a0a0f; --surf:#111118; --acc:#4466ff; --txt:#ffffff; --muted:#808090; }
        body { background: var(--bg); color: var(--txt); font-family: 'Sora', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: var(--surf); padding: 25px; border-radius: 20px; width: 100%; max-width: 500px; border: 1px solid #303048; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--acc); font-size: 1.5rem; margin-bottom: 5px; }
        .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 25px; }
        #q-text { font-size: 1.1rem; font-weight: 600; min-height: 60px; margin-bottom: 20px; line-height: 1.4; }
        .options { display: grid; gap: 12px; }
        button { background: #181824; border: 1px solid #303048; color: white; padding: 15px; border-radius: 12px; cursor: pointer; text-align: left; font-family: inherit; font-size: 1rem; transition: 0.2s; }
        button:hover { border-color: var(--acc); background: #202030; }
        button:disabled { cursor: default; opacity: 0.6; border-color: #303048; }
        #feedback { margin-top: 25px; padding: 15px; border-radius: 10px; text-align: center; font-weight: 600; display: none; }
        .btn-next { background: var(--acc); color: white; border: none; width: 100%; margin-top: 20px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>🎓 BR-Tagesquiz</h1>
    <p class="sub">Hüttenfuchs Edition • Wissen für Stahlwerker</p>
    
    <div id="q-text">Lade Fragen...</div>
    <div id="q-options" class="options"></div>
    <div id="feedback"></div>
    
   <button id="next-btn" class="btn-next" style="display:none;" onclick="handleNext()">Nächste Frage</button>
</div>

<script>
let allQuestions = [];
let currentSessionQuestions = [];
let currentIndex = 0;
let correctCount = 0; // NEU: Zählt die richtigen Antworten

async function loadQuiz() {
    try {
        const res = await fetch('fragen.csv');
        const txt = await res.text();
        allQuestions = txt.split('\n').filter(r => r.trim() !== '' && r.includes(';'));
        allQuestions.shift(); // Kopfzeile entfernen

        prepareDailyQuestions();
        showQuestion();
    } catch (e) {
        document.getElementById('q-text').innerText = "Fehler beim Laden!";
    }
}

function prepareDailyQuestions() {
    const now = new Date();
    // Eindeutige Zahl für den Tag (Tage seit 1970)
    const dayId = Math.floor(now / 86400000); 
    
    // 5 neue Fragen basierend auf dem Tag
    // Wir nehmen einfach einen Startpunkt in der Liste, der jeden Tag um 5 wandert
    const startIdx = (dayId * 5) % allQuestions.length;
    const dailyNew = [];
    for(let i=0; i<5; i++) {
        dailyNew.push(allQuestions[(startIdx + i) % allQuestions.length]);
    }

    // 2 Wiederholungsfragen (die von gestern)
    const prevDayId = dayId - 1;
    const prevStartIdx = (prevDayId * 5) % allQuestions.length;
    const dailyRepeat = [];
    for(let i=0; i<2; i++) {
        dailyRepeat.push(allQuestions[(prevStartIdx + i) % allQuestions.length]);
    }

    // Kombinieren: Erst die 2 von gestern (Wiederholung), dann die 5 neuen
    currentSessionQuestions = [...dailyRepeat, ...dailyNew];
}

function showQuestion() {
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');
    const opts = document.getElementById('q-options');
    
    feedback.style.display = 'none';
    nextBtn.style.display = 'none';

    if (currentIndex >= currentSessionQuestions.length) {
        showFinal();
        return;
    }

    const cols = currentSessionQuestions[currentIndex].split(';');
    const isRepeat = currentIndex < 2; // Die ersten zwei sind Wiederholung

    document.getElementById('q-text').innerHTML = `
        <small style="color:var(--acc)">${isRepeat ? '🔄 WIEDERHOLUNG VON GESTERN' : '🔥 NEUE FRAGE'}</small><br>
        <span style="font-size:0.8rem; color:var(--muted)">Frage ${currentIndex + 1} von 7</span><br>
        ${cols[1]}`;

    opts.innerHTML = '';
    ['A', 'B', 'C'].forEach((letter, i) => {
        const btn = document.createElement('button');
        btn.className = 'btn-act';
        btn.style.width = '100%';
        btn.style.textAlign = 'left';
        btn.innerText = letter + ') ' + cols[i+2];
btn.onclick = () => {
            feedback.style.display = 'block';
            
            // Die Lösung aus der CSV (Spalte 6) holen und Leerzeichen entfernen
            const correctLetter = cols[5] ? cols[5].trim() : "";
            const isCorrect = letter === correctLetter;
            
            // NEU: Wenn richtig, einen Punkt zum Gesamtergebnis addieren
            if (isCorrect) {
                correctCount++;
            }
            
            feedback.innerText = isCorrect ? "✅ Richtig!" : "❌ Falsch! Lösung: " + correctLetter;
            feedback.style.color = isCorrect ? "#44ff88" : "#ff4444";
            feedback.style.background = isCorrect ? "rgba(0,255,100,0.1)" : "rgba(255,0,0,0.1)";
            
            // Buttons deaktivieren, damit man nicht mehrfach klicken kann
            Array.from(opts.children).forEach(b => b.disabled = true);
            
            // "Nächste Frage" oder "Ergebnis" Button einblenden
            nextBtn.style.display = 'block';
            nextBtn.innerText = (currentIndex + 1 < currentSessionQuestions.length) ? "Nächste Frage" : "Ergebnis zeigen";
        };
        opts.appendChild(btn);
    });
}

function handleNext() {
    currentIndex++;
    showQuestion();
}

function showFinal() {
    const total = currentSessionQuestions.length;
    const prozent = Math.round((correctCount / total) * 100);
    
    // Persönliche Bewertung je nach Erfolg
    let bewertung = "";
    let farbe = "";
    
    if (prozent === 100) {
        bewertung = "🏆 Absoluter Hütten-Experte! Alles richtig!";
        farbe = "#44ff88"; // Grün
    } else if (prozent >= 75) {
        bewertung = "🦾 Starke Leistung! Du kennst deine Rechte.";
        farbe = "#4466ff"; // Blau
    } else if (prozent >= 50) {
        bewertung = "👍 Bestanden! Da geht aber noch was.";
        farbe = "#ffaa00"; // Orange
    } else {
        bewertung = "⚒️ Da musst du nochmal ran. Frag mal deinen BR!";
        farbe = "#ff4444"; // Rot
    }

    // Das Layout für die Ergebnis-Box
    document.getElementById('q-text').innerHTML = `
        <div style="text-align:center; padding:20px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid ${farbe};">
            <h2 style="margin:0; color:${farbe};">Dein Ergebnis</h2>
            <div style="font-size: 3rem; font-weight: bold; margin: 10px 0;">${correctCount} <span style="font-size:1.5rem; color:var(--muted);">von</span> ${total}</div>
            <p style="font-size: 1.1rem; font-weight: 600;">${prozent}% Wissen</p>
            <p style="font-style: italic; color: var(--muted);">${bewertung}</p>
        </div>`;
    
    // Optionen und Button leeren/ausblenden
    document.getElementById('q-options').innerHTML = "";
    document.getElementById('next-btn').style.display = 'none';
}

// Im HTML muss der Button jetzt handleNext() aufrufen
// <button id="next-btn" class="btn-next" style="display:none;" onclick="handleNext()">Nächste Frage</button>
// WICHTIG: Dieser Befehl startet das Quiz!
loadQuiz();
</script>

</body>
</html>
