<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hüttenfuchs - BR Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0a0a0f; --surf:#111118; --acc:#4466ff; --txt:#ffffff; --muted:#808090; }
        body { background: var(--bg); color: var(--txt); font-family: 'Sora', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: var(--surf); padding: 25px; border-radius: 20px; width: 100%; max-width: 500px; border: 1px solid #303048; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--acc); font-size: 1.5rem; margin-bottom: 5px; }
        .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 25px; }
        #q-text { font-size: 1.1rem; font-weight: 600; min-height: 60px; margin-bottom: 20px; line-height: 1.4; }
        .options { display: grid; gap: 12px; }
        button { background: #181824; border: 1px solid #303048; color: white; padding: 15px; border-radius: 12px; cursor: pointer; text-align: left; font-family: inherit; font-size: 1rem; transition: 0.2s; }
        button:hover { border-color: var(--acc); background: #202030; }
        button:disabled { cursor: default; opacity: 0.6; border-color: #303048; }
        #feedback { margin-top: 25px; padding: 15px; border-radius: 10px; text-align: center; font-weight: 600; display: none; }
        .btn-next { background: var(--acc); color: white; border: none; width: 100%; margin-top: 20px; text-align: center; font-weight: bold; padding: 15px; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h1>🎓 BR-Tagesquiz</h1>
    <p class="sub">Hüttenfuchs Edition • Wissen für Stahlwerker</p>
    
    <div id="q-text">Lade...</div>
    <div id="q-options" class="options"></div>
    <div id="feedback"></div>
    
    <button id="next-btn" class="btn-next" style="display:none;" onclick="handleNext()">Nächste Frage</button>
</div>

<script>
// --- VARIABLEN ---
let allQuestions = [];
let currentSessionQuestions = [];
let currentIndex = 0;
let correctCount = 0; 
let trackingAllowed = false;

// Ewige Statistik aus dem Speicher laden
let totalPlayed = localStorage.getItem('hüttenfuchs_total') || 0;
let totalCorrect = localStorage.getItem('hüttenfuchs_correct') || 0;

// --- 1. START-FUNKTION ---
async function loadQuiz() {
    const consent = localStorage.getItem('hüttenfuchs_consent');
    
    // Wenn noch nie gefragt wurde -> Abfrage zeigen
    if (consent === null) {
        showConsent();
        return;
    }
    
    trackingAllowed = (consent === 'true');
    startLogic();
}

// --- 2. DATENSCHUTZ-ABFRAGE ---
function showConsent() {
    document.getElementById('q-options').innerHTML = "";
    document.getElementById('q-text').innerHTML = `
        <div style="text-align:left; padding:15px; background: rgba(68, 102, 255, 0.1); border-radius: 15px; border: 1px solid var(--acc);">
            <h3 style="margin-top:0; color:var(--acc);">📊 Statistik aktivieren?</h3>
            <p style="font-size:0.85rem; line-height:1.4;">Möchtest du, dass deine Ergebnisse <b>lokal auf deinem Gerät</b> gespeichert werden, um deinen ewigen Schnitt anzuzeigen?</p>
            <p style="font-size:0.7rem; color:var(--muted);">🔒 Deine Daten verlassen niemals dieses Gerät. Keine Übertragung an Dritte oder Server.</p>
            <div style="display:grid; gap:10px; margin-top:15px;">
                <button onclick="setConsent(true)" style="background:var(--acc); text-align:center;">Ja, Statistik führen</button>
                <button onclick="setConsent(false)" style="text-align:center; opacity:0.7;">Nein, nicht speichern</button>
            </div>
        </div>`;
}

function setConsent(val) {
    localStorage.setItem('hüttenfuchs_consent', val);
    trackingAllowed = val;
    startLogic();
}

// --- 3. DAS EIGENTLICHE QUIZ LADEN ---
async function startLogic() {
    try {
        const res = await fetch('fragen.csv?v=' + new Date().getTime());
        const txt = await res.text();
        allQuestions = txt.split(/\r?\n/).filter(r => r.trim() !== '' && r.includes(';'));
        allQuestions.shift(); 

        prepareDailyQuestions();
        showQuestion();
    } catch (e) {
        document.getElementById('q-text').innerText = "Fehler beim Laden der Fragen!";
    }
}

function prepareDailyQuestions() {
    const now = new Date();
    const dayId = Math.floor(now.getTime() / 86400000); 
    const startIdx = (dayId * 5) % allQuestions.length;
    const dailyNew = [];
    for(let i=0; i<5; i++) {
        dailyNew.push(allQuestions[(startIdx + i) % allQuestions.length]);
    }
    const prevDayId = dayId - 1;
    const prevStartIdx = (prevDayId * 5) % allQuestions.length;
    const dailyRepeat = [];
    for(let i=0; i<2; i++) {
        dailyRepeat.push(allQuestions[(prevStartIdx + i) % allQuestions.length]);
    }
    currentSessionQuestions = [...dailyRepeat, ...dailyNew];
}

function showQuestion() {
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');
    const opts = document.getElementById('q-options');
    feedback.style.display = 'none';
    nextBtn.style.display = 'none';

    if (currentIndex >= currentSessionQuestions.length) {
        showFinal();
        return;
    }

    const cols = currentSessionQuestions[currentIndex].split(';');
    const isRepeat = currentIndex < 2;

    document.getElementById('q-text').innerHTML = `
        <small style="color:var(--acc)">${isRepeat ? '🔄 WIEDERHOLUNG' : '🔥 NEUE FRAGE'}</small><br>
        <span style="font-size:0.8rem; color:var(--muted)">Frage ${currentIndex + 1} von 7</span><br>
        ${cols[1]}`;

    opts.innerHTML = '';
    ['A', 'B', 'C'].forEach((letter, i) => {
        const btn = document.createElement('button');
        btn.innerText = letter + ') ' + cols[i+2];
        btn.onclick = () => {
            feedback.style.display = 'block';
            const correctLetter = cols[5] ? cols[5].trim() : "";
            const isCorrect = letter === correctLetter;
            if (isCorrect) correctCount++; 
            feedback.innerText = isCorrect ? "✅ Richtig!" : "❌ Falsch! Lösung: " + correctLetter;
            feedback.style.color = isCorrect ? "#44ff88" : "#ff4444";
            feedback.style.background = isCorrect ? "rgba(0,255,100,0.1)" : "rgba(255,0,0,0.1)";
            Array.from(opts.children).forEach(b => b.disabled = true);
            nextBtn.style.display = 'block';
            nextBtn.innerText = (currentIndex + 1 < currentSessionQuestions.length) ? "Nächste Frage" : "Ergebnis zeigen";
        };
        opts.appendChild(btn);
    });
}

function handleNext() {
    currentIndex++;
    showQuestion();
}

// --- 4. DAS FINALE LAYOUT (ERGEBNIS) ---
function showFinal() {
    let statsHTML = "";

    // Wenn Nutzer zugestimmt hat, Statistik berechnen und anzeigen
    if (trackingAllowed) {
        totalPlayed = parseInt(totalPlayed) + currentSessionQuestions.length;
        totalCorrect = parseInt(totalCorrect) + correctCount;
        localStorage.setItem('hüttenfuchs_total', totalPlayed);
        localStorage.setItem('hüttenfuchs_correct', totalCorrect);
        const ewigerSchnitt = Math.round((totalCorrect / totalPlayed) * 100);
        
        statsHTML = `
            <hr style="border: 0; border-top: 1px solid #303048; margin: 15px 0;">
            <p style="font-size: 0.85rem; color: var(--acc); margin-bottom: 5px;">📊 Dein ewiger Schnitt</p>
            <div style="font-size: 1.5rem; font-weight: bold;">${ewigerSchnitt}%</div>
            <small style="color: var(--muted); font-size: 0.7rem;">(${totalCorrect} Treffer aus ${totalPlayed} Fragen)</small>
        `;
    }

    const total = currentSessionQuestions.length;
    const prozentHeute = Math.round((correctCount / total) * 100);
    let farbe = prozentHeute >= 70 ? "#44ff88" : "#ffaa00";

    document.getElementById('q-text').innerHTML = `
        <div style="text-align:center; padding:20px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid ${farbe};">
            <h2 style="margin:0; color:${farbe};">Heute: ${correctCount} von ${total}</h2>
            <p style="font-size: 1.1rem; font-weight: 600; margin: 10px 0;">${prozentHeute}% richtig</p>
            ${statsHTML}
            <div style="margin-top: 20px; font-size: 0.6rem; color: var(--muted);">
                🔒 Ergebnisse werden nur lokal gespeichert.
            </div>
        </div>`;
        
    document.getElementById('q-options').innerHTML = "";
    document.getElementById('next-btn').style.display = 'none';
}

// DER MOTOR: Startet alles
loadQuiz();
</script>

</body>
</html>
